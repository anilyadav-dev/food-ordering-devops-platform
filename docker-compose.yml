name: food-ordering-app

services:
    mongo:
        image: mongo:7
        container_name: mongo
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db

    backend:
        build:
            context: ./app/backend
        image: backend
        container_name: backend-container
        ports:
            - "8080:8080"
        depends_on:
            - mongo
        environment:
            MONGO_URI: mongodb://mongo:27017/food_ordering_devops

    frontend:
        build:
            context: ./app/frontend
        image: frontend
        container_name: frontend-container
        ports:
            - "5173:5173"
        depends_on:
            - backend

    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "80:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - frontend
            - backend

volumes:
    mongo_data:
