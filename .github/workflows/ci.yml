name: CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # 1. Checkout code
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Setup Node
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            # 3. Configure AWS credentials
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            # 4. Login to Amazon ECR
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            # 5. Install backend deps
            - name: Install backend dependencies
              working-directory: app/backend
              run: npm install

            # 6. Check backend formatting
            - name: Backend format check
              working-directory: app/backend
              run: npm run format:check

            # 7. Install frontend deps
            - name: Install frontend dependencies
              working-directory: app/frontend
              run: npm install --legacy-peer-deps

            # 8. Run frontend lint
            - name: Frontend lint
              working-directory: app/frontend
              run: npm run lint

            # 9. Check frontend formatting
            - name: Frontend format check
              working-directory: app/frontend
              run: npm run format:check

            # 10. Build backend Docker image
            - name: Build backend Docker image
              run: docker build -t backend ./app/backend

            # 11. Build frontend Docker image
            - name: Build frontend Docker image
              run: docker build -t frontend ./app/frontend

            # ✅ 12. Set commit SHA tag
            - name: Set image tag
              run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

            # ✅ 13. Tag backend image (latest + SHA)
            - name: Tag backend image
              run: |
                  docker tag backend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/backend:latest
                  docker tag backend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/backend:${IMAGE_TAG}

            # ✅ 14. Push backend image
            - name: Push backend image
              run: |
                  docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/backend:latest
                  docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/backend:${IMAGE_TAG}

            # ✅ 15. Tag frontend image (latest + SHA)
            - name: Tag frontend image
              run: |
                  docker tag frontend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/frontend:latest
                  docker tag frontend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/frontend:${IMAGE_TAG}

            # ✅ 16. Push frontend image
            - name: Push frontend image
              run: |
                  docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/frontend:latest
                  docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/frontend:${IMAGE_TAG}
