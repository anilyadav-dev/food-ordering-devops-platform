name: CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # 1. Checkout code
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Setup Node
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            # 3. Install backend deps
            - name: Install backend dependencies
              working-directory: app/backend
              run: npm install

            # 4. Check backend formatting
            - name: Backend format check
              working-directory: app/backend
              run: npm run format:check

            # 5. Install frontend deps
            - name: Install frontend dependencies
              working-directory: app/frontend
              run: npm install

            # 6. Run frontend lint
            - name: Frontend lint
              working-directory: app/frontend
              run: npm run lint

            # 7. Check frontend formatting
            - name: Frontend format check
              working-directory: app/frontend
              run: npm run format:check

            # 8. Build backend Docker image
            - name: Build backend Docker image
              run: docker build -t backend ./app/backend

            # 9. Build frontend Docker image
            - name: Build frontend Docker image
              run: docker build -t frontend ./app/frontend
