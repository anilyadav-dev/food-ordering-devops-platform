apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend
spec:
    replicas: 1
    selector:
        matchLabels:
            app: backend
    template:
        metadata:
            labels:
                app: backend
        spec:
            imagePullSecrets:
                - name: ecr-secret
            containers:
                - name: backend
                  image: 673436240700.dkr.ecr.us-west-1.amazonaws.com/backend:latest
                  ports:
                      - containerPort: 8080
                  env:
                      - name: MONGO_URI
                        valueFrom:
                            configMapKeyRef:
                                name: app-config
                                key: MONGO_URI
                      - name: JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: app-secret
                                key: JWT_SECRET
                  livenessProbe:
                      httpGet:
                          path: /api/health
                          port: 8080
                      initialDelaySeconds: 60
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 5
                  readinessProbe:
                      httpGet:
                          path: /api/health
                          port: 8080
                      initialDelaySeconds: 40
                      periodSeconds: 5
                      timeoutSeconds: 5
                      failureThreshold: 5
                  resources:
                      requests:
                          memory: "128Mi"
                          cpu: "250m"
                      limits:
                          memory: "256Mi"
                          cpu: "500m"
