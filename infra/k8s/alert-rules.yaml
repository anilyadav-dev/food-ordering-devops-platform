apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
    name: backend-alert-rules
    labels:
        release: monitoring
spec:
    groups:
        - name: backend.rules
          rules:
              - alert: BackendDown
                expr: up{job="backend-service"} == 0
                for: 1m
                labels:
                    severity: critical
                annotations:
                    summary: "Backend is down"
                    description: "Prometheus cannot scrape the backend-service for 1 minute."

              - alert: HighCPUUsage
                expr: sum(rate(container_cpu_usage_seconds_total{pod=~"backend-.*"}[1m])) > 0.5
                for: 1m
                labels:
                    severity: warning
                annotations:
                    summary: "High backend CPU usage"
                    description: "Backend CPU usage has been above 0.5 cores for 1 minute."
